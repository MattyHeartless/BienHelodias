server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /ngsw.json {
    add_header Cache-Control "no-cache";
  }

  location /ngsw-worker.js {
    add_header Cache-Control "no-cache";
  }
}
