<div class="min-h-screen px-4 pb-16 pt-4 sm:px-6 lg:px-10 lg:pt-6">
  <div class="mx-auto max-w-7xl">
    <header class="admin-topbar">
      <div class="nav-shell">
        <div class="nav-brand">
          <div class="nav-brand-mark">
            <span class="nav-brand-monogram">BH</span>
          </div>
          <div>
            <p class="nav-workspace-title">{{ workspaceTitle() }}</p>
          </div>
        </div>

        <button class="menu-toggle lg:hidden" type="button" aria-label="Abrir menu" (click)="openMenu()" [attr.aria-expanded]="menuOpen()">
          <span class="material-symbols-outlined text-[1.35rem]">menu</span>
        </button>

        <div class="nav-desktop hidden lg:flex">
          <nav class="nav-cluster" aria-label="Navegacion principal">
            @for (item of navigation(); track item.route) {
              <a
                class="nav-pill"
                [routerLink]="item.route"
                routerLinkActive="nav-pill-active"
                [routerLinkActiveOptions]="{ exact: item.route === '/dashboard/overview' }"
              >
                <span class="material-symbols-outlined text-[1.05rem]">{{ item.icon }}</span>
                {{ item.label }}
              </a>
            }

            @if (publicStoreUrl(); as storeUrl) {
              <a class="nav-pill" [href]="storeUrl">
                <span class="material-symbols-outlined text-[1.05rem]">storefront</span>
                Ver tienda
              </a>
            }
          </nav>

          <button class="ghost-button nav-logout" type="button" (click)="logout()">
            <span class="material-symbols-outlined text-base">logout</span>
            Cerrar sesion
          </button>
        </div>
      </div>
    </header>

    <section class="workspace-strip" aria-label="Contexto del workspace">
      <p>{{ workspaceSubtitle() }}</p>
      <span>{{ workspaceBadge() }}</span>
    </section>

    <app-mobile-drawer-menu
      [open]="menuOpen()"
      [title]="workspaceTitle()"
      [description]="workspaceSubtitle()"
      [navigation]="navigation()"
      [storeUrl]="publicStoreUrl()"
      (closeMenu)="closeMenu()"
      (logout)="logout()"
    />

    <router-outlet />
  </div>
</div>
